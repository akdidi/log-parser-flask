name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repo
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Step 3: Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 4: Build Docker image
      - name: Build Docker image
        run: |
          docker build -t log-parser:latest .

      # Step 5: Tag and push image
      - name: Push Docker image
        run: |
          docker tag log-parser:latest ${{ secrets.DOCKER_USERNAME }}/log-parser:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/log-parser:latest

      # Step 6: Set up kubectl
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.27.0'

      # Step 7.1: Create kubeconfig file
      - name: Set up kubeconfig
        run: |
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > kubeconfig

      # Step 7.2: Deploy to Kubernetes
      - name: Deploy to Kubernetes
        env:
          KUBECONFIG: ./kubeconfig
        run: |
          kubectl get nodes
          kubectl set image deployment/log-parser log-parser=${{ secrets.DOCKER_USERNAME }}/log-parser:latest
          kubectl rollout status deployment/log-parser